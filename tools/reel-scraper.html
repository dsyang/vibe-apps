<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IG Reel Scraper</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif;
    background: #111;
    color: #eee;
    padding: 16px;
    min-height: 100dvh;
  }
  h1 { font-size: 20px; margin-bottom: 16px; }
  label { display: block; font-size: 13px; color: #999; margin-bottom: 4px; }
  input {
    width: 100%;
    padding: 12px;
    border: 1px solid #333;
    border-radius: 8px;
    background: #1a1a1a;
    color: #eee;
    font-size: 16px; /* prevents iOS zoom */
    margin-bottom: 12px;
    -webkit-appearance: none;
  }
  input::placeholder { color: #555; }
  input:focus { outline: none; border-color: #0095f6; }
  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 8px;
    background: #0095f6;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    -webkit-appearance: none;
  }
  button:disabled { background: #333; color: #666; cursor: not-allowed; }
  button:active:not(:disabled) { background: #007bd4; }
  #status {
    margin-top: 12px;
    font-size: 13px;
    color: #999;
    min-height: 18px;
  }
  #status.error { color: #e74c3c; }
  #output { margin-top: 16px; display: none; }
  #image-container {
    width: 100%;
    border-radius: 8px;
    overflow: hidden;
    background: #1a1a1a;
    margin-bottom: 12px;
  }
  #image-container img {
    width: 100%;
    display: block;
  }
  #meta {
    background: #1a1a1a;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 12px;
    font-size: 14px;
    line-height: 1.5;
  }
  #meta strong { color: #fff; }
  #meta .stat { display: inline-block; margin-right: 16px; color: #ccc; }
  #json-output {
    background: #1a1a1a;
    border-radius: 8px;
    padding: 12px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  #json-output summary {
    cursor: pointer;
    font-size: 13px;
    color: #999;
    padding: 4px 0;
  }
  #json-output pre {
    margin-top: 8px;
    font-size: 12px;
    line-height: 1.4;
    color: #aaa;
    white-space: pre-wrap;
    word-break: break-word;
  }
</style>
</head>
<body>

<h1>IG Reel Scraper</h1>

<label for="token">Apify API Token</label>
<input type="password" id="token" placeholder="apify_api_..." autocomplete="off">

<label for="url">Instagram Reel URL</label>
<input type="url" id="url" placeholder="https://www.instagram.com/reel/...">

<button id="btn" onclick="scrape()">Scrape Reel</button>
<div id="status"></div>

<div id="output">
  <div id="image-container"></div>
  <div id="meta"></div>
  <div id="json-output">
    <details>
      <summary>Raw JSON Response</summary>
      <pre id="json-pre"></pre>
    </details>
  </div>
</div>

<script>
const ACTOR_ID = 'apify~instagram-reel-scraper';
const API_BASE = 'https://api.apify.com/v2';

const $ = (id) => document.getElementById(id);

function setStatus(msg, isError) {
  const el = $('status');
  el.textContent = msg;
  el.className = isError ? 'error' : '';
}

async function scrape() {
  const token = $('token').value.trim();
  const url = $('url').value.trim();

  if (!token) { setStatus('Please enter your Apify API token.', true); return; }
  if (!url) { setStatus('Please enter an Instagram reel URL.', true); return; }

  const btn = $('btn');
  btn.disabled = true;
  $('output').style.display = 'none';
  setStatus('Starting actor run...');

  try {
    // Step 1: Start the actor run
    const runRes = await fetch(`${API_BASE}/acts/${ACTOR_ID}/runs?token=${encodeURIComponent(token)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: [url], resultsLimit: 1 }),
    });

    if (!runRes.ok) {
      const errText = await runRes.text();
      throw new Error(`Failed to start actor (${runRes.status}): ${errText}`);
    }

    const runData = await runRes.json();
    const runId = runData.data?.id;
    const datasetId = runData.data?.defaultDatasetId;

    if (!runId) throw new Error('No run ID returned.');

    // Step 2: Poll for completion
    let status = runData.data?.status;
    while (status === 'RUNNING' || status === 'READY') {
      setStatus(`Actor status: ${status}... polling`);
      await new Promise((r) => setTimeout(r, 3000));

      const pollRes = await fetch(`${API_BASE}/actor-runs/${runId}?token=${encodeURIComponent(token)}`);
      if (!pollRes.ok) throw new Error(`Poll failed (${pollRes.status})`);
      const pollData = await pollRes.json();
      status = pollData.data?.status;
    }

    if (status !== 'SUCCEEDED') {
      throw new Error(`Actor run finished with status: ${status}`);
    }

    setStatus('Fetching results...');

    // Step 3: Fetch dataset items
    const dsRes = await fetch(`${API_BASE}/datasets/${datasetId}/items?token=${encodeURIComponent(token)}&format=json`);
    if (!dsRes.ok) throw new Error(`Failed to fetch results (${dsRes.status})`);
    const items = await dsRes.json();

    if (!items.length) {
      setStatus('No results returned. The reel may be private or the URL invalid.', true);
      btn.disabled = false;
      return;
    }

    // Render results
    renderResults(items);
    setStatus(`Done — ${items.length} result(s)`);

  } catch (err) {
    setStatus(err.message, true);
  } finally {
    btn.disabled = false;
  }
}

function renderResults(items) {
  const item = items[0];
  const imgContainer = $('image-container');
  const meta = $('meta');

  // Find best image URL from the response
  const imgUrl = item.displayUrl || item.imageUrl || item.thumbnailUrl || '';
  if (imgUrl) {
    imgContainer.innerHTML = `<img src="${escapeAttr(imgUrl)}" alt="Reel thumbnail" referrerpolicy="no-referrer" onerror="this.parentElement.innerHTML='<div style=\\'padding:40px;text-align:center;color:#555\\'>Thumbnail unavailable (CDN link expired)</div>'">`;
  } else {
    imgContainer.innerHTML = '<div style="padding:40px;text-align:center;color:#555">No image available</div>';
  }

  // Build metadata display
  const owner = item.ownerUsername || item.ownerFullName || '—';
  const caption = item.caption || '';
  const likes = fmt(item.likesCount);
  const comments = fmt(item.commentsCount);
  const plays = fmt(item.videoPlayCount);
  const shares = fmt(item.sharesCount);
  const ts = item.timestamp ? new Date(item.timestamp).toLocaleDateString() : '';

  meta.innerHTML = `
    <div><strong>@${esc(owner)}</strong>${ts ? ' · ' + esc(ts) : ''}</div>
    <div style="margin:8px 0">
      <span class="stat">&#9829; ${likes}</span>
      <span class="stat">&#128172; ${comments}</span>
      <span class="stat">&#9654; ${plays}</span>
      ${shares != null ? `<span class="stat">&#8618; ${shares}</span>` : ''}
    </div>
    ${caption ? `<div style="margin-top:8px;color:#ccc;font-size:13px">${esc(caption.slice(0, 300))}${caption.length > 300 ? '...' : ''}</div>` : ''}
  `;

  // JSON dump
  $('json-pre').textContent = JSON.stringify(items, null, 2);
  $('output').style.display = 'block';
}

function fmt(n) {
  if (n == null) return '—';
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1_000) return (n / 1_000).toFixed(1) + 'K';
  return String(n);
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function escapeAttr(s) {
  return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Persist token in sessionStorage so it survives page reloads
if (sessionStorage.getItem('apify_token')) {
  $('token').value = sessionStorage.getItem('apify_token');
}
$('token').addEventListener('input', () => {
  sessionStorage.setItem('apify_token', $('token').value);
});
</script>
</body>
</html>
